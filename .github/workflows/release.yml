name: Build and Release

on:
  push:
    tags:
      - "v*" # 推送 v1.0.0, v2.0.0 等标签时触发
  workflow_dispatch: # 支持手动触发
    inputs:
      version:
        description: "版本号 (例如: 1.0.0)"
        required: true
        type: string

permissions:
  contents: write # 允许创建 Release

jobs:
  build:
    name: 构建并发布
    runs-on: windows-latest # WinForms 需要 Windows 环境

    steps:
      # 1. 检出代码
      - name: 获取源代码
        uses: actions/checkout@v4

      # 2. 安装 .NET
      - name: 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 3. 还原依赖包
      - name: 还原 NuGet 包
        run: dotnet restore

      # 4. 编译项目
      - name: 编译 Release 版本
        run: dotnet build -c Release --no-restore

      # 5. 发布为单文件 exe
      - name: 发布可执行文件
        run: |
          dotnet publish -c Release `
            -r win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:DebugType=none `
            -o ./publish

      # 6. 验证 exe 是否生成
      - name: 验证构建结果
        run: |
          if (Test-Path "./publish/DriveGroupManager.exe") {
            Write-Host "✅ 构建成功！"
            Write-Host "📁 文件大小: $([math]::Round((Get-Item './publish/DriveGroupManager.exe').Length / 1MB, 2)) MB"
          } else {
            Write-Host "❌ 构建失败：未找到 exe 文件"
            exit 1
          }

      # 7. 获取版本号
      - name: 获取版本号
        id: get_version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $VERSION = "v${{ github.event.inputs.version }}"
          } else {
            $VERSION = "${{ github.ref_name }}"
          }
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          echo "版本号: $VERSION"

      # 8. 创建 ZIP 压缩包
      - name: 打包成 ZIP
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath DriveGroupManager-${{ env.VERSION }}.zip -Force
          Write-Host "✅ ZIP 包已创建"

      # 9. 创建 Release 并上传文件
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          body: |
            ## 🎉 硬盘分组管理器 ${{ env.VERSION }}

            ### 📥 下载使用
            1. 下载 `DriveGroupManager-${{ env.VERSION }}.zip`
            2. 解压到任意文件夹
            3. 双击 `DriveGroupManager.exe` 运行

            ### ✨ 功能介绍
            - 📁 自定义硬盘分组
            - 🚀 一键打开分组内所有硬盘
            - 💾 分组数据自动保存
            - 🖥️ 支持高 DPI 显示

            ### ⚙️ 系统要求
            - Windows 10 / Windows 11
            - 需要安装 [.NET 6.0 运行时](https://dotnet.microsoft.com/download)

          files: |
            ./DriveGroupManager-${{ env.VERSION }}.zip
            ./publish/DriveGroupManager.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
